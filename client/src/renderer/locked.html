<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen Locked</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
